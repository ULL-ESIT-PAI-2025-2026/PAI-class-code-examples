<body>
  <h1>flex-grow</h1>
  <p>
  Let's unset the height and width of our flex items again:
  </p>
  <div id="flex-container">
    <span class="flex-item"></span>
    <div class="flex-item"></div>
    <span class="flex-item"></span>
  </div>
  <h2>The CSS (flex-grow.css) code for this page:</h1>
  <pre>
  <code>
#flex-container {
  display: flex;
  border: 2px solid black;
  height: 150px;
}

.flex-item {
  border-radius: 10px;
  flex-grow: 1;
  background-color: purple;
  margin: 5px;
}
  </code>
  </pre>
</body>
